server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/moyeorak?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}   # ? ?? ????? ???
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate                # Flyway ?? ? validate/none ??
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

  flyway:
    enabled: true
    locations: classpath:db/migration   # V1__*.sql ? ??
    baseline-on-migrate: true           # ?? ???? ??? ?????
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

# (??) JWT ??? ????? ???
jwt:
  secret: ${JWT_SECRET:change-me-in-local}
