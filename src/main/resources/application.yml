# application-local.yml (또는 dev용 프로필 파일)
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/moyeorak_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: choi
    password: 1q2w3e4r!!
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none         # Flyway 사용, 스키마는 마이그레이션으로만
    properties:
      hibernate:
        format_sql: true
        # dialect 명시는 생략 가능 (자동 감지)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: moyeorak_db
    validate-on-migrate: false

  # 로컬에선 SQS/Redis 같은 외부 인프라 자동 구성 막아두기
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.sqs.SqsAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cache:
    type: simple  # 캐시는 메모리(Simple)로

  jackson:
    time-zone: Asia/Seoul

logging:
  level:
    org.hibernate.SQL: debug

# ★ placeholder 에러 해결: 로컬용 기본값(임시)
cloudfront:
  base-url: http://localhost:8080

# --- Swagger / Actuator 접근 편의 (로컬) ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,loggers,threaddump,heapdump
  endpoint:
    health:
      show-details: always

# --- JWT 임시 우회 스위치 (로컬에서만 true) ---
security:
  jwt:
    dev-bypass: true
