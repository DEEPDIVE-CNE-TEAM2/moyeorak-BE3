name: Deploy to Amazon ECS (Blue/Green)

on:
  push:
    branches:
      - dev  # 배포 브랜치

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: moyeorak
  ECS_CLUSTER: moyeorak-cluster
  ECS_SERVICE: goorm-task2-service-u3avic9z
  ECS_TASK_DEF: moyeorak-task
  CONTAINER_NAME: moyeorak-container

jobs:
  deploy:
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (using Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle (test skip)
        run: ./gradlew build -x test

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEF \
            --query "taskDefinition" \
            --output json > task-def.json

          # Remove read-only / non-reusable fields
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-def.json > cleaned-task-def.json

      - name: Update ECS task definition with new image
        id: update-task-def
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          jq --arg IMAGE "$IMAGE" --arg NAME "$CONTAINER_NAME" \
            '.containerDefinitions[] |= if .name == $NAME then .image = $IMAGE else . end' \
            cleaned-task-def.json > new-task-def.json

      - name: Register new ECS task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Prepare AppSpec with new task ARN
        run: |
          sed "s|REPLACE_ME_TASK_DEF|$TASK_DEF_ARN|" appspec.yml > rendered-appspec.yml

      - name: Create deployment
        run: |
          aws deploy create-deployment \
            --application-name moyeorak-codedeploy-app \
            --deployment-group-name moyeorak-codedeploy-group \
            --deployment-config-name CodeDeployDefault.ECSAllAtOnce \
            --revision revisionType=AppSpecContent,appSpecContent={content="$(awk '{printf "%s\\n", $0}' rendered-appspec.yml)"} \
            --deployment-style deploymentType=BLUE_GREEN,deploymentOption=WITH_TRAFFIC_CONTROL \
            --file-exists-behavior OVERWRITE
