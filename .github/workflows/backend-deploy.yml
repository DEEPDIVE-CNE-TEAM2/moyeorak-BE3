name: Deploy to Amazon ECS (Blue/Green)

on:
  push:
    branches:
      - dev  # 배포 브랜치 .

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: moyeorak
  ECS_CLUSTER: moyeorak-cluster
  ECS_SERVICE: goorm-task2-service-u3avic9z
  ECS_TASK_DEF: moyeorak-task
  CONTAINER_NAME: moyeorak-container

jobs:
  deploy:
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (using Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle (test skip)
        run: ./gradlew build -x test

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEF \
            --query "taskDefinition" \
            --output json > task-def.json

          # Remove read-only / non-reusable fields
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-def.json > cleaned-task-def.json

      - name: Update ECS task definition with new image
        id: update-task-def
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          jq --arg IMAGE "$IMAGE" --arg NAME "$CONTAINER_NAME" \
            '.containerDefinitions[] |= if .name == $NAME then .image = $IMAGE else . end' \
            cleaned-task-def.json > new-task-def.json

      - name: Register new ECS task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Prepare AppSpec with new task ARN
        run: |
          sed "s|REPLACE_ME_TASK_DEF|$TASK_DEF_ARN|" appspec.yml > rendered-appspec.yml

      - name: Reset listener rule before deployment #(Blue: 100%, Green: 0%)
        run: |
          LISTENER_ARN="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:listener/app/goorm-ALB/97aef8d1ebfd177e/88dc76dea2f047a6"
          TARGET_GROUP_BLUE="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:targetgroup/ECS-Target-Group/94afaec22947e1ab"
          TARGET_GROUP_GREEN="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:targetgroup/ECS-Target-Group-ALT/b12416d0f4e12b9b"

          aws elbv2 modify-listener \
            --listener-arn $LISTENER_ARN \
            --default-actions '[{"Type":"forward","ForwardConfig":{"TargetGroups":[{"TargetGroupArn":"'"$TARGET_GROUP_BLUE"'", "Weight":100},{"TargetGroupArn":"'"$TARGET_GROUP_GREEN"'", "Weight":0}]}}]'

      - name: Create deployment
        id: create_deploy
        run: |
          CONTENT=$(jq -Rs . < rendered-appspec.yml)
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name moyeorak-backend \
            --deployment-group-name moyeorak-backend-dg \
            --deployment-config-name CodeDeployDefault.ECSAllAtOnce \
            --revision "{\"revisionType\":\"AppSpecContent\",\"appSpecContent\":{\"content\":$CONTENT}}" \
            --query deploymentId --output text)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to succeed
        run: |
          aws deploy wait deployment-successful --deployment-id ${{ env.DEPLOYMENT_ID }}

      - name: Reset listener rule after deployment #(Blue: 100%, Green: 0%)
        run: |
          LISTENER_ARN="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:listener/app/goorm-ALB/97aef8d1ebfd177e/88dc76dea2f047a6"
          TARGET_GROUP_BLUE="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:targetgroup/ECS-Target-Group/94afaec22947e1ab"
          TARGET_GROUP_GREEN="arn:aws:elasticloadbalancing:ap-northeast-2:004407157704:targetgroup/ECS-Target-Group-ALT/b12416d0f4e12b9b"

          aws elbv2 modify-listener \
            --listener-arn $LISTENER_ARN \
            --default-actions '[{"Type":"forward","ForwardConfig":{"TargetGroups":[{"TargetGroupArn":"'"$TARGET_GROUP_BLUE"'", "Weight":100},{"TargetGroupArn":"'"$TARGET_GROUP_GREEN"'", "Weight":0}]}}]'
