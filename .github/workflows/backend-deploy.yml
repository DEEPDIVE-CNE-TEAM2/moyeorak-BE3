name: Deploy to Amazon ECS (Blue/Green)

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: moyeorak
  ECS_CLUSTER: moyeorak-cluster
  ECS_SERVICE: goorm-task2-service-u3avic9z
  ECS_TASK_DEF: moyeorak-task
  CONTAINER_NAME: app-container

jobs:
  deploy:
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: none
      contents: read

    steps:
      # ------------------------
      # 1. 소스 코드 체크아웃.
      # ------------------------
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest dev
        run: |
          git fetch origin dev
          git checkout dev
          git pull origin dev

      # ------------------------
      # 2. AWS 인증 설정
      # ------------------------
      - name: AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------
      # 3. Amazon ECR 로그인
      # ------------------------
      - name: Amazon ECR 로그인(실패시 retry 3번)
        run: |
          for i in 1 2 3; do
            if aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}; then
              echo "Amazon ECR 로그인 성공"
              exit 0
            fi
            echo "Amazon ECR 로그인 실패 (시도 $i), 재시도 중..."
            sleep 10
          done
          echo "Amazon ECR 로그인에 3회 실패했습니다. AWS 인증 정보 및 권한을 확인해주세요." >> fail.log
          exit 1

      # ------------------------
      # 4. Docker 메타데이터 추출
      # ------------------------
      - name: Docker 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}

      # ------------------------
      # 5. JDK & Gradle 빌드
      # ------------------------
      - name: JDK & Gradle 빌드
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 (테스트 제외)
        run: ./gradlew build -x test

      # ------------------------
      # 6. Docker 이미지 빌드 & 푸시
      # ------------------------
      - name: Docker 이미지 빌드 & 푸시 (실패시 retry 3번)
        run: |
          for i in 1 2 3; do
            if docker buildx build --push \
              -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
              -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .; then
              echo "Docker 이미지 빌드 및 푸시 성공"
              exit 0
            fi
            echo "Docker 이미지 빌드 및 푸시 실패 (시도 $i), 재시도 중..."
            sleep 15
          done
          echo "Docker 이미지 빌드 또는 푸시에 3회 실패했습니다. 빌드 환경과 권한을 확인해주세요." >> fail.log
          exit 1

      # ------------------------
      # 7. ECS Task Definition 다운로드
      # ------------------------
      - name: ECS Task Definition 다운로드 (실패시 retry 3번)
        run: |
          for i in 1 2 3; do
            if aws ecs describe-task-definition \
              --task-definition $ECS_TASK_DEF \
              --query "taskDefinition" \
              --output json > task-def.json; then
              jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )' task-def.json > cleaned-task-def.json
              exit 0
            fi
            echo "ECS Task Definition 정보 다운로드 실패 (시도 $i), 재시도 중..."
            sleep 10
          done
          echo "ECS Task Definition 정보를 3회 연속 다운로드하지 못했습니다. Task Definition 이름과 권한을 확인해주세요." >> fail.log
          exit 1

      # ------------------------
      # 8. Task Definition 이미지 업데이트
      # ------------------------
      - name: Task Definition 이미지 업데이트
        id: update-task-def
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          jq --arg IMAGE "$IMAGE" --arg NAME "$CONTAINER_NAME" \
            '.containerDefinitions[] |= if .name == $NAME then .image = $IMAGE else . end' \
            cleaned-task-def.json > new-task-def.json

      # ------------------------
      # 9. Task Definition 등록
      # ------------------------
      - name: Task Definition 등록 (실패시 retry 3번)
        run: |
          for i in 1 2 3; do
            if TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://new-task-def.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text); then
              echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV
              exit 0
            fi
            echo "ECS Task Definition 등록 실패 (시도 $i), 재시도 중..."
            sleep 10
          done
          echo "ECS Task Definition 등록을 3회 연속 실패했습니다. JSON 형식 및 권한을 점검해 주세요." >> fail.log
          exit 1

      # ------------------------
      # 10. CodeDeploy AppSpec 준비
      # ------------------------
      - name: CodeDeploy AppSpec 준비
        run: |
          sed "s|REPLACE_ME_TASK_DEF|$TASK_DEF_ARN|" appspec.yml > rendered-appspec.yml

      # ------------------------
      # 11. CodeDeploy 배포 생성
      # ------------------------
      - name: CodeDeploy 배포 생성 (실패시 retry 3번)
        run: |
          CONTENT=$(jq -Rs . < rendered-appspec.yml)
          for i in 1 2 3; do
            if aws deploy create-deployment \
              --application-name moyeorak-backend \
              --deployment-group-name moyeorak-backend-dg \
              --deployment-config-name CodeDeployDefault.ECSAllAtOnce \
              --revision "{\"revisionType\":\"AppSpecContent\",\"appSpecContent\":{\"content\":$CONTENT}}"; then
              exit 0
            fi
            echo "CodeDeploy 배포 생성 실패 (시도 $i), 재시도 중..."
            sleep 15
          done
          echo "CodeDeploy 배포 생성에 3회 실패했습니다. AppSpec 파일 및 AWS 권한을 확인해주세요." >> fail.log
          exit 1

      # ------------------------
      # 12. 보안 검사 - Snyk
      # ------------------------
      - name: Run Snyk test
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --debug
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run Snyk monitor
        uses: snyk/actions/node@0.4.0
        with:
          command: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ------------------------
      # 13. 토큰으로 API 접근 확인 (curl)
      # ------------------------
      - name: Check API with token (curl)
        env:
          BACKEND_BEARER_TOKEN: ${{ secrets.BACKEND_BEARER_TOKEN }}
        run: |
          echo "Testing API with Authorization header..."
          curl -v -o /tmp/curl_out.txt -s -w "\nHTTP_STATUS:%{http_code}\n" \
            -H "Authorization: Bearer $BACKEND_BEARER_TOKEN" \
            -H "Accept: application/json" \
            "https://api.moyeorak.cloud/" || true
          echo "=== curl 결과 (마지막 200줄) ==="
          tail -n 200 /tmp/curl_out.txt || true

      # ------------------------
      # 14. 보안 검사 - OWASP ZAP (base64 방식으로 스크립트 생성 + hook 사용)
      # ------------------------
      - name: Prepare ZAP hook & httpsender script (base64-write to avoid heredoc issues)
        run: |
          mkdir -p zap-hooks

          # add_header_request.py content (base64 -> decode)
          echo "" | base64 -d > zap-hooks/add_header_request.py

          # zap_hook.py content (base64 -> decode)
          echo "" | base64 -d > zap-hooks/zap_hook.py

      - name: Run OWASP ZAP baseline (with hook)
        env:
          BACKEND_BEARER_TOKEN: ${{ secrets.BACKEND_BEARER_TOKEN }}
        run: |
          mkdir -p zap-reports
          echo "Starting ZAP baseline scan with hook..."
          docker run --rm \
            -v "${{ github.workspace }}/zap-reports":/zap/wrk:rw \
            -v "${{ github.workspace }}/zap-hooks":/zap/wrk/zap-hooks:ro \
            -e BACKEND_BEARER_TOKEN="$BACKEND_BEARER_TOKEN" \
            -t ghcr.io/zaproxy/zaproxy:latest \
            /bin/sh -c "/zap/zap-baseline.py -t https://api.moyeorak.cloud \
              --hook /zap/wrk/zap-hooks/zap_hook.py \
              -r /zap/wrk/zap_report.html \
              -w /zap/wrk/zap_report.md \
              -J /zap/wrk/zap_out.json \
              -z \"-config connection.ignore401=true\"" \
            2>&1 | tee /tmp/zap_cli.log || true

          echo "=== zap-reports 디렉토리 (컨텐츠 확인) ==="
          ls -la zap-reports || true

          echo "=== ZAP stdout 마지막 200줄 ==="
          tail -n 200 /tmp/zap_cli.log || true

      - name: OWASP ZAP 아티팩트 업로드 (모든 생성 파일 업로드)
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-reports/**

      # ------------------------
      # 15. 실패 시 Discord 알림
      # ------------------------
      - name: 실패 시 Discord 알림
        if: failure()
        run: |
          if [ -f fail.log ]; then
            STEP_NAME=$(sed -E \
              -e 's/AKIA[0-9A-Z]{16}/[REDACTED_AWS_KEY]/g' \
              -e 's/[A-Za-z0-9_\/+=-]{20,}/[REDACTED_TOKEN]/g' \
              fail.log)
          else
            STEP_NAME="알 수 없는 실패 단계"
          fi

          ACTOR="${{ github.actor }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if echo "$STEP_NAME" | grep -qiE "deploy|ecs|codedeploy"; then
            SEVERITY="심각(Critical) 🔥"
            COLOR=16711680
          else
            SEVERITY="중간(Medium) ⚠"
            COLOR=15844367
          fi

          PAYLOAD=$(jq -n \
            --arg title "🚨 CI/CD 배포 실패 알림" \
            --arg desc "**실패 단계:** $STEP_NAME\n**심각도:** $SEVERITY" \
            --arg actor "$ACTOR" \
            --arg author "$AUTHOR" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg url "$RUN_URL" \
            --argjson color $COLOR \
            '{embeds: [{title: $title, description: $desc, color: $color,
              fields: [
                {name: "푸시한 사람", value: $actor, inline: true},
                {name: "커밋 작성자", value: $author, inline: true},
                {name: "레포지토리", value: $repo, inline: true},
                {name: "브랜치", value: $branch, inline: true},
                {name: "커밋 메시지", value: $commit, inline: false},
                {name: "실행 결과 보기", value: $url, inline: false}
              ]}]}')

          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK }}"
